services:
  voxion-api:
    image: ${IMAGE:-ghcr.io/greatbooms/voxion:latest}
    container_name: voxion-api
    network_mode: host
    restart: unless-stopped
    command: sh -c "npx prisma migrate deploy && node dist/main"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: "3000"
      STORAGE_ROOT: /app/storage
    volumes:
      - ${STORAGE_PATH:-./storage}:/app/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  voxion-worker:
    image: ${IMAGE:-ghcr.io/greatbooms/voxion:latest}
    container_name: voxion-worker
    network_mode: host
    restart: unless-stopped
    command: node dist/worker
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      STORAGE_ROOT: /app/storage
    volumes:
      - ${STORAGE_PATH:-./storage}:/app/storage
    depends_on:
      voxion-api:
        condition: service_healthy
